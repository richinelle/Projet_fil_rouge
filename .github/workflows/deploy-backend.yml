name: CI/CD Backend SGEE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Linting
  # ─────────────────────────────────────────
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: php-cs-fixer

      - name: Vérifier le style du code
        working-directory: ./Backend
        run: php-cs-fixer fix --dry-run --diff
        continue-on-error: true

  # ─────────────────────────────────────────
  # JOB 2 : Build image Docker
  # ─────────────────────────────────────────
  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build et Push image
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/sgee-backend:latest

  # ─────────────────────────────────────────
  # JOB 3 : Tests Laravel (PHPUnit)
  # ─────────────────────────────────────────
  test:
    name: Tests PHPUnit
    runs-on: ubuntu-latest
    needs: docker

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laravel_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql
          coverage: xdebug

      - name: Installer les dépendances
        working-directory: ./Backend
        run: composer install --no-progress --prefer-dist --ignore-platform-reqs

      - name: Préparer environnement Laravel
        working-directory: ./Backend
        run: |
          cp .env.example .env
          php artisan key:generate --force
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=laravel_test" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=root" >> .env
          echo "JWT_SECRET=$(php artisan jwt:secret --show)" >> .env

      - name: Lancer les migrations
        working-directory: ./Backend
        run: php artisan migrate --force

      - name: Lancer les tests avec coverage
        working-directory: ./Backend
        run: php artisan test --coverage-clover=coverage.xml

  # ─────────────────────────────────────────
  # JOB 4 : Scan Trivy
  # ─────────────────────────────────────────
  trivy:
    name: Scan Trivy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Scanner l'image Docker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/sgee-backend:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ─────────────────────────────────────────
  # JOB 5 : Analyse SonarCloud
  # ─────────────────────────────────────────
  sonarcloud:
    name: Analyse SonarCloud
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyse SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: ./Backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────
  # JOB 6 : Déploiement FTP o2switch
  # ─────────────────────────────────────────
  deploy:
    name: Déploiement FTP
    runs-on: ubuntu-latest
    needs: [trivy, sonarcloud]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Installer dépendances Laravel (sans dev)
        working-directory: ./Backend
        run: composer install --no-interaction --no-dev --optimize-autoloader --ignore-platform-reqs

      - name: Deploy Laravel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./Backend/
          server-dir: /nguetsop.cdwfs.net/backend/
          exclude: |
            **/.git*
            **/.env
            **/docker-compose*
            **/docker/**
            **/Dockerfile
            **/node_modules/**
            **/.github/**
            **/.gitignore
            **/tests/**
