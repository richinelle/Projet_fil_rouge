name: CI/CD Frontend SGEE

on:
  push:
    branches: [main ]

jobs:
  # ─── 1. ANALYSE SONARQUBE ───────────────────
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer dépendances
        working-directory: ./frontend
        run: npm ci

      - name: Lancer les tests
        working-directory: ./frontend
        run: npm test -- --coverage --watchAll=false

      - name: Démarrer SonarQube
        working-directory: ./backend
        run: |
          docker compose -f docker-compose.ci.yml up -d
          echo "Attente démarrage SonarQube (60s)..."
          sleep 60

      - name: Analyse SonarQube
        uses: SonarSource/sonarqube-scan-action@master
        with:
          projectBaseDir: ./frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://localhost:9000

      - name: Arrêter SonarQube
        working-directory: ./backend
        if: always()
        run: docker compose -f docker-compose.ci.yml down

  # ─── 2. BUILD REACT ─────────────────────────
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer dépendances
        working-directory: ./frontend
        run: npm ci

      - name: Build React
        working-directory: ./frontend
        env:
          VITE_API_URL: https://nguesop.cdwfs.net/api
        run: npm run build

      # ─── 3. DEPLOY FTP ──────────────────────
      - name: Deploy React via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/
          server-dir: /app.nguesop.cdwfs.net/
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.github/**
