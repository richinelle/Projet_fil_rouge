groups:
  - name: conteneurs
    rules:
      # Alerte si un conteneur est arrêté
      - alert: ConteneurArrete
        expr: absent(container_last_seen{name!=""})
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Conteneur arrêté"
          description: "Un conteneur Docker est arrêté depuis plus d'1 minute"

      # Alerte si CPU > 80%
      - alert: CPUEleve
        expr: rate(container_cpu_usage_seconds_total{name!=""}[5m]) * 100 > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "CPU élevé sur {{ $labels.name }}"
          description: "Le conteneur {{ $labels.name }} utilise {{ $value }}% du CPU"

      # Alerte si Mémoire > 80%
      - alert: MemoireElevee
        expr: (container_memory_usage_bytes{name!=""} / container_spec_memory_limit_bytes{name!=""}) * 100 > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Mémoire élevée sur {{ $labels.name }}"
          description: "Le conteneur {{ $labels.name }} utilise {{ $value }}% de la mémoire"

      # Alerte si le service est down
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} est DOWN"
          description: "Le service {{ $labels.job }} ne répond plus"
