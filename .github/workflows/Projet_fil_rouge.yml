name: CI/CD Laravel + Docker

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Vérification du code (Linting)
  # ─────────────────────────────────────────
  lint:
    name:  Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: php-cs-fixer

      - name: Vérifier le style du code
        run: php-cs-fixer fix --dry-run --diff


  # ─────────────────────────────────────────
  # JOB 2 : Build image Docker
  # ─────────────────────────────────────────
  docker:
    name:  Build Docker
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build et Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/projet_fil_rouge:latest

  # ─────────────────────────────────────────
  # JOB 3 : Tests Laravel (PHPUnit)
  # ─────────────────────────────────────────
  test:
    name:  Tests PHPUnit
    runs-on: ubuntu-latest
    needs: docker

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laravel_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql

      - name: Installer les dépendances
        run: composer install --no-progress --prefer-dist

      - name: Copier le .env de test
        run: cp .env.example .env

      - name: Générer la clé Laravel
        run: php artisan key:generate

      - name: Configurer la base de données de test
        run: |
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=laravel_test" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=root" >> .env
          echo "JWT_SECRET=$(php artisan jwt:secret --show)" >> .env

      - name: Lancer les migrations
        run: php artisan migrate --force

      - name: Lancer les tests
        run: php artisan test



  # JOB 4 : Scan de sécurité

  security:
    name:  Scan Trivy
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Scanner l'image Docker
      uses: aquasecurity/trivy-action@master
      with:
         image-ref: ${{ secrets.DOCKER_USERNAME }}/projet_fil_rouge:latest
         format: table
         exit-code: 1
         severity: CRITICAL,HIGH
         ignore-unfixed: true  # ← ignore les failles sans correctif disponible

  # JOB 5 : Déploiement sur serveur

  deploy:
    name:  Déploiement
    runs-on: ubuntu-latest
    needs: security
    if: false

    steps:
      - name: Déployer via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/projet_fil_rouge
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose exec app php artisan migrate --force
