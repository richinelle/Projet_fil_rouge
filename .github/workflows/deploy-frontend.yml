name: CI/CD Frontend SGEE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Linting
  # ─────────────────────────────────────────
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Installer dépendances
        working-directory: ./Frontend
        run: npm ci

      - name: Linting ESLint
        working-directory: ./Frontend
        run: npm run lint
        continue-on-error: true

  # ─────────────────────────────────────────
  # JOB 2 : Build image Docker
  # ─────────────────────────────────────────
  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build et Push image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/sgee-frontend:latest
          build-args: |
            VITE_API_URL=https://nguetsop.cdwfs.net/api

  # ─────────────────────────────────────────
  # JOB 3 : Scan Trivy
  # ─────────────────────────────────────────
  trivy:
    name: Scan Trivy
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Scanner l'image Docker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/sgee-frontend:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ─────────────────────────────────────────
  # JOB 4 : Analyse SonarCloud
  # ─────────────────────────────────────────
  sonarcloud:
    name: Analyse SonarCloud
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyse SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: ./Frontend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────
  # JOB 5 : Build React + Déploiement FTP
  # ─────────────────────────────────────────
  deploy:
    name: Build et Déploiement FTP
    runs-on: ubuntu-latest
    needs: [trivy, sonarcloud]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Installer dépendances
        working-directory: ./Frontend
        run: npm ci

      - name: Build React
        working-directory: ./Frontend
        env:
          VITE_API_URL: https://nguetsop.cdwfs.net/api
        run: npm run build

      - name: Deploy React via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./Frontend/dist/
          server-dir: /app.nguetsop.cdwfs.net/
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.github/**
